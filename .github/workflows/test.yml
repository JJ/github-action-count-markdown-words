name: Test

on:
  push:
  pull_request:

jobs:
  business-logic-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build action bundle
        run: npm run build

      - name: Run tests
        run: npm test
